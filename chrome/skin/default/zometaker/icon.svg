<?xml version="1.0" encoding="UTF-8"?>
<!--
	Zometaker icon.
	Stylised book stack with a refresh-arrow overlay.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="4" y="4" width="88" height="88" rx="20" fill="url(#bg)"/>

  <!-- book stack -->
  <g transform="translate(48 52)">
    <!-- book 1 (bottom) -->
    <rect x="-22" y="6" width="44" height="10" rx="2" fill="url(#b)"/>
    <!-- book 2 -->
    <rect x="-26" y="-4" width="48" height="10" rx="2" fill="url(#b)" opacity="0.9"/>
    <!-- book 3 (top, tilted) -->
    <g transform="rotate(-12)">
      <rect x="-22" y="-18" width="44" height="10" rx="2" fill="#fde68a"/>
    </g>
  </g>

  <!-- refresh arrow -->
  <g transform="translate(72 26)" fill="none" stroke="#ffffff" stroke-width="4"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 0 A 8 8 0 1 1 -8 8" />
    <polyline points="-2,-2 -8,0 -8,6" fill="none"/>
  </g>
</svg>